<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Troll Tunes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:#fff;
background:#050505;
position:relative;
}

.bg-glow{
position:fixed;
inset:0;
z-index:-2;
transition:1s ease;
background:
radial-gradient(circle at center,
rgba(255,0,255,.35),
rgba(0,150,255,.18) 35%,
#050505 75%);
}

body::after{
content:"";
position:fixed;
inset:0;
z-index:-1;

background:
radial-gradient(circle,
transparent 40%,
rgba(0,0,0,.35) 70%,
rgba(0,0,0,.8) 100%);
}

.wrapper{
width:100%;
max-width:1400px;
padding:30px;
}

.logo{
text-align:center;
font-size:54px;
font-weight:600;
letter-spacing:12px;
margin-bottom:30px;
}

/* CAROUSEL */

.carousel{
height:520px;
position:relative;
display:flex;
justify-content:center;
align-items:center;
perspective:1800px;
}

.cover-track{
position:relative;
width:100%;
height:100%;
}

.album-card{
position:absolute;
top:50%;
left:50%;

width:320px;
height:420px;

transform-style:preserve-3d;

border-radius:36px;
overflow:hidden;

transition:
transform 1.1s cubic-bezier(.22,1,.36,1),
opacity 1.1s ease,
filter 1.1s ease,
box-shadow 1.1s ease;

background:
linear-gradient(#0000,#0000) padding-box,
linear-gradient(
90deg,
#ff0080,
#00ffff,
#00ff66,
#ffee00,
#ff0080
) border-box;

border:3px solid transparent;

background-size:300% 300%;

animation:rgbBorder 8s linear infinite;

box-shadow:
0 0 25px rgba(255,255,255,.12),
0 0 50px rgba(255,0,255,.15);
}

.album-card img{
width:100%;
height:100%;
object-fit:cover;
}

.album-card::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:-45px;
height:80px;

background:inherit;

transform:
scaleY(-1);

opacity:.15;
filter:
blur(20px);
}

@keyframes rgbBorder{

0%{
background-position:0% 50%;
}

100%{
background-position:300% 50%;
}

}

/* PLAYER */

.glass-player{

position:relative;

width:100%;

margin-top:20px;

border-radius:50px;

overflow:hidden;
}

.player-rgb{

position:absolute;
inset:-2px;

background:
linear-gradient(
90deg,
#ff0080,
#00ffff,
#00ff66,
#ffee00,
#ff0080
);

background-size:300% 300%;

animation:
rgbBorder 8s linear infinite;

filter:
blur(18px);

opacity:.9;
}

.player-inner{

position:relative;

display:flex;
align-items:center;

gap:25px;

padding:25px 35px;

border-radius:50px;

background:
linear-gradient(
135deg,
rgba(255,255,255,.16),
rgba(255,255,255,.05)
);

backdrop-filter:
blur(35px);

-webkit-backdrop-filter:
blur(35px);

border:
1px solid rgba(255,255,255,.15);

box-shadow:
0 10px 60px rgba(0,0,0,.4);
}

/* CONTROLS */

.controls{
display:flex;
align-items:center;
gap:18px;
}

.icon-btn{

background:none;
border:none;

font-size:38px;
color:white;

cursor:pointer;

transition:.3s;
}

.icon-btn:hover{
transform:scale(1.15);
}

.play-btn{

width:95px;
height:95px;

border-radius:50%;

border:2px solid rgba(255,255,255,.35);

background:
rgba(255,255,255,.08);

color:white;

font-size:42px;

cursor:pointer;

backdrop-filter:blur(15px);

transition:.3s;

box-shadow:
0 0 25px rgba(255,0,255,.3);
}

.play-btn:hover{
transform:scale(1.05);
}

/* TRACK */

.track-section{

display:flex;
align-items:center;

gap:18px;

min-width:280px;
}

.mini-cover{

width:90px;
height:90px;

object-fit:cover;

border-radius:22px;

border:2px solid rgba(255,255,255,.25);
}

.track-text h3{
font-size:32px;
font-weight:600;
}

.track-text p{
opacity:.8;
font-size:18px;
}

/* TIME */

.time-wrap{
font-size:18px;
opacity:.85;
min-width:55px;
}

/* PROGRESS */

.progress-wrap{
flex:1;
}

#progress{

width:100%;

height:10px;

appearance:none;
-webkit-appearance:none;

border-radius:20px;

background:
rgba(255,255,255,.12);

cursor:pointer;
}

#progress::-webkit-slider-thumb{

-webkit-appearance:none;

width:24px;
height:24px;

border-radius:50%;

background:white;

box-shadow:
0 0 15px #ff00ff,
0 0 25px #00ffff;
}

/* DOWNLOAD */

.download-btn{

padding:18px 30px;

border-radius:24px;

text-decoration:none;

color:white;

font-weight:600;

border:1px solid rgba(255,255,255,.25);

background:
rgba(255,255,255,.08);

backdrop-filter:
blur(10px);

transition:.3s;
}

.download-btn:hover{

transform:translateY(-2px);

box-shadow:
0 0 25px rgba(0,255,255,.3);
}

/* MOBILE */

@media(max-width:900px){

.logo{
font-size:34px;
letter-spacing:6px;
}

.album-card{
width:220px;
height:300px;
}

.player-inner{

flex-wrap:wrap;

justify-content:center;
}

.track-section{
width:100%;
justify-content:center;
}

.progress-wrap{
width:100%;
}

}/* PASTE PART 2 CSS HERE */

</style>

</head>

<body>

<div class="bg-glow"></div>

<div class="wrapper">

<h1 class="logo">
TROLL TUNES
</h1>

<!-- CAROUSEL -->

<div class="carousel">

<div id="coverTrack" class="cover-track">

</div>

</div>

<!-- PLAYER -->

<div class="glass-player">

<div class="player-rgb"></div>

<div class="player-inner">

<!-- CONTROLS -->

<div class="controls">

<button class="icon-btn" onclick="prevSong()">

⏮

</button>

<button
id="playBtn"
class="play-btn"
onclick="togglePlay()">

▶

</button>

<button class="icon-btn" onclick="nextSong()">

⏭

</button>

</div>

<!-- TRACK INFO -->

<div class="track-section">

<img
id="miniCover"
class="mini-cover"
src="lunar.JPG">

<div class="track-text">

<h3 id="songTitle">

Lunar

</h3>

<p>

Troll Tunes

</p>

</div>

</div>

<!-- TIME -->

<div class="time-wrap">

<span id="currentTime">

0:00

</span>

</div>

<!-- PROGRESS -->

<div class="progress-wrap">

<input
type="range"
id="progress"
min="0"
max="100"
value="0">

</div>

<!-- DURATION -->

<div class="time-wrap">

<span id="duration">

0:00

</span>

</div>

<!-- DOWNLOAD -->

<a
id="downloadBtn"
class="download-btn"
download>

DOWNLOAD

</a>

</div>

</div>

</div>

<audio id="audio"></audio>

<script>

<script>

const songs = [

{
title:"Lunar",
file:"Lunar.mp3",
cover:"lunar.JPG",
color:"#6ec1ff"
},

{
title:"Say It",
file:"Say it.mp3",
cover:"sayit.JPG",
color:"#ff4fd8"
},

{
title:"Deep End",
file:"Deep end.mp3",
cover:"deepend.JPG",
color:"#ffd84d"
},

{
title:"Wonder",
file:"Wonder.mp3",
cover:"wonder.JPG",
color:"#8a7dff"
},

{
title:"Dream",
file:"Dream.mp3",
cover:"dream.JPG",
color:"#ff6b9a"
}

];

let currentSong = 0;

const audio = document.getElementById("audio");
const carousel = document.getElementById("carousel");
const songTitle = document.getElementById("songTitle");
const miniCover = document.getElementById("miniCover");
const progress = document.getElementById("progress");
const downloadBtn = document.getElementById("downloadBtn");
const playBtn = document.getElementById("playBtn");
const playerBar = document.querySelector(".player-bar");

function renderCarousel(){

carousel.innerHTML = "";

songs.forEach((song,index)=>{

const card = document.createElement("div");
card.className = "album-card";

let offset = index - currentSong;

if(offset > 2) offset -= songs.length;
if(offset < -2) offset += songs.length;

if(offset === 0){

card.style.transform =
"translateX(0px) translateY(0px) scale(1)";
card.style.opacity = "1";
card.style.zIndex = "5";

}

else if(offset === -1){

card.style.transform =
"translateX(-260px) rotateY(28deg) scale(.88)";
card.style.opacity = ".8";
card.style.zIndex = "4";

}

else if(offset === 1){

card.style.transform =
"translateX(260px) rotateY(-28deg) scale(.88)";
card.style.opacity = ".8";
card.style.zIndex = "4";

}

else if(offset === -2){

card.style.transform =
"translateX(-430px) rotateY(40deg) scale(.72)";
card.style.opacity = ".45";
card.style.zIndex = "3";

}

else if(offset === 2){

card.style.transform =
"translateX(430px) rotateY(-40deg) scale(.72)";
card.style.opacity = ".45";
card.style.zIndex = "3";

}

card.innerHTML =
`<img src="${song.cover}" alt="${song.title}">`;

carousel.appendChild(card);

});

}

function loadSong(index){

audio.src = songs[index].file;

songTitle.textContent =
songs[index].title;

miniCover.src =
songs[index].cover;

downloadBtn.href =
songs[index].file;

document.documentElement.style.setProperty(
"--accent",
songs[index].color
);

playerBar.style.boxShadow =
`0 0 30px ${songs[index].color}66,
 inset 0 1px 0 rgba(255,255,255,.3)`;

renderCarousel();

}

function togglePlay(){

if(audio.paused){

audio.play();

}else{

audio.pause();

}

}

function nextSong(){

currentSong++;

if(currentSong >= songs.length){
currentSong = 0;
}

loadSong(currentSong);

audio.play();

}

function prevSong(){

currentSong--;

if(currentSong < 0){
currentSong = songs.length - 1;
}

loadSong(currentSong);

audio.play();

}

audio.addEventListener("timeupdate",()=>{

progress.value =
(audio.currentTime / audio.duration) * 100 || 0;

});

progress.addEventListener("input",()=>{

audio.currentTime =
(progress.value / 100) * audio.duration;

});

audio.addEventListener("play",()=>{

playBtn.innerHTML = "❚❚";

});

audio.addEventListener("pause",()=>{

playBtn.innerHTML = "▶";

});

audio.addEventListener("ended",()=>{

nextSong();

});

loadSong(currentSong);

</script>

</body>
</html>/* PASTE PART 3 JAVASCRIPT HERE */

</script>

</body>
</html>
