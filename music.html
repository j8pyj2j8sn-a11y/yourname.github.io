<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Tunes Music Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,
#5b1a5b 0%,
#220022 45%,
#000000 100%);
color:white;
}
    
body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
z-index:-1;

background:
radial-gradient(
circle,
transparent 30%,
rgba(0,0,0,.25) 55%,
rgba(0,0,0,.65) 80%,
rgba(0,0,0,.9) 100%
);
}
.player-wrapper{
width:100%;
max-width:420px;
margin:auto;

padding:20px 15px 80px;

display:flex;
flex-direction:column;
align-items:center;

box-sizing:border-box;
}

.spotify-logo{
font-size:28px;
font-weight:bold;
margin-bottom:40px;
opacity:.8;
}

.album-container{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
perspective:1000px;
}


    
#cover{
width:100%;
height:100%;
object-fit:cover;
border-radius:25px;
display:block;
}
    
.player{
width:95%;
max-width:430px;
margin:15px auto;
padding:20px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 20px 50px rgba(0,0,0,.45),
inset 0 1px 1px rgba(255,255,255,.25);

box-sizing:border-box;
overflow:hidden;
border-radius:30px;
}
  @media (max-width:768px){

.player{
width:94vw;
padding:20px;
}

.album-cover img,
#cover{
width:100%;
height:100%;
object-fit:cover;
display:block;
border-radius:25px;
max-width:none;
aspect-ratio:auto;
}
.song-title{
font-size:32px;
font-weight:700;
margin-top:25px;
margin-bottom:35px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:-15px;
}

.controls button{
width:60px;
height:60px;
font-size:22px;
}

.play-btn{
width:78px !important;
height:78px !important;
font-size:30px !important;
}

}

.song-title{
font-size:32px;
font-weight:700;
margin-top:25px;
margin-bottom:25px !important;
}

.artist,
.song-title{
display:none;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.controls button{
width:72px;
height:72px;
border:none;
border-radius:22px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.18);
color:white;
font-size:28px;
cursor:pointer;
transition:.3s;
box-shadow:
0 8px 32px rgba(0,0,0,.35),
inset 0 1px 1px rgba(255,255,255,.25);
}

.controls button:hover{
transform:translateY(-4px);
background:rgba(255,255,255,.18);
}

#playBtn{
width:75px;
height:75px;
border-radius:24px;
font-size:36px;
background:rgba(255,255,255,.18);
box-shadow:
0 12px 40px rgba(0,0,0,.4),
inset 0 1px 1px rgba(255,255,255,.3);
}

.progress-container{
width:100%;
margin-top:10px;
}

#progress{
width:100%;
cursor:pointer;
}

.download-btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:10px;

margin-top:30px;
padding:16px 40px;

border:none;
border-radius:50px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

color:#ffffff;
font-size:18px;
font-weight:700;
text-decoration:none;
cursor:pointer;

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 0 10px rgba(0,255,255,0.4),
0 0 20px rgba(0,255,255,0.25),
inset 0 0 15px rgba(255,255,255,0.08);

transition:all .35s ease;
}

.download-btn:hover{
transform:translateY(-3px) scale(1.05);

box-shadow:
0 0 15px rgba(0,255,255,0.7),
0 0 35px rgba(0,255,255,0.5),
0 0 60px rgba(0,255,255,0.3);

background:rgba(255,255,255,0.12);
}

.download-btn:active{
transform:scale(.96);
}

.player-bar{
margin-top:40px;
padding:20px;
border-radius:40px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
display:flex;
align-items:center;
justify-content:center;
gap:20px;
}

.player-bar img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.player-info{
text-align:left;
}

.player-info h4{
font-size:16px;
}

.player-info p{
font-size:13px;
color:#ccc;
}

audio{
display:none;
}

footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
color:#aaa;
font-size:14px;
}

@media(max-width:768px){

.album-cover{
width:250px;
height:250px;
border-radius:50%;
}

.player-bar{
flex-direction:column;
}
}
    @media (max-width:768px){

    .player{
        width:96vw;
        padding:15px;
    }

    #cover{
        max-width:220px;
    }

    .song-title{
        font-size:32px;
    }

    .controls{
        gap:12px;
    }

    .controls button{
        width:58px;
        height:58px;
    }

    .play-btn{
        width:78px !important;
        height:78px !important;
    }
}
    @media (max-width:768px){

.player{
width:95%;
max-width:380px;
padding:18px;
}

.song-title{
font-size:42px;
}

.artist{
font-size:16px;
}

.controls{
gap:12px;
}

.controls button{
width:60px;
height:60px;
font-size:22px;
}

.play-btn{
width:75px !important;
height:75px !important;
}
.album-cover.playing{
animation:spin 15s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
#progress{
-webkit-appearance:none;
appearance:none;
height:8px;
border-radius:20px;
background:rgba(255,255,255,.15);
}

#progress::-webkit-slider-thumb{
-webkit-appearance:none;
width:18px;
height:18px;
border-radius:50%;
background:#00ffff;
box-shadow:
0 0 10px #00ffff,
0 0 25px #00ffff;
cursor:pointer;
}

}
.album-container{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
perspective:1000px;
}
    
.carousel{
position:relative;

width:100%;
height:320px;

display:flex;
justify-content:center;
align-items:center;

perspective:1200px;
}

.album-cover{
width:220px;
height:280px;

position:relative;
z-index:5;

overflow:hidden;
border-radius:25px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 15px 40px rgba(0,0,0,.45);
}

.side-card{
position:absolute;
width:180px;
height:240px;
border-radius:20px;
overflow:hidden;
opacity:.6;

background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);
}

.side-card img{
width:100%;
height:100%;
object-fit:cover;
}

.left{
transform:
translateX(-140px)
rotateY(40deg)
scale(.9);
}

.right{
transform:
translateX(140px)
rotateY(-40deg)
scale(.9);
}
    .far-left{
transform:
translateX(-260px)
rotateY(55deg)
scale(.75);

opacity:.35;
}

.far-right{
transform:
translateX(260px)
rotateY(-55deg)
scale(.75);

opacity:.35;
}

.spotify-player{

width:100%;
margin-top:30px;

padding:18px 25px;

border-radius:35px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.15);

display:flex;
align-items:center;
justify-content:space-between;

gap:15px;
}

.spotify-player button{

background:none;
border:none;

color:white;

font-size:26px;

cursor:pointer;
}

.track-info{

display:flex;
align-items:center;

gap:12px;

flex:1;
}

.track-info img{

width:45px;
height:45px;

border-radius:10px;

object-fit:cover;
}

.track-info h4{

font-size:14px;
margin:0;
}

.track-info p{

font-size:12px;
opacity:.7;
}

</style>
</head>
<body>

<div class="player-wrapper player">

<div class="spotify-logo">
TROLL TUNES
</div>

<div class="album-container">

<div class="carousel">

<div class="side-card far-left">
<img src="cover4.JPG">
</div>

<div class="side-card left">
<img src="cover2.JPG">
</div>

<div class="album-cover">
<img id="cover" src="cover1.JPG">
</div>

<div class="side-card right">
<img src="cover3.JPG">
</div>

<div class="side-card far-right">
<img src="cover5.JPG">
</div>

</div>

</div>

</div>
<h1 id="title" class="song-title">
Song Name
</h1>

<p id="artist" class="artist">
Troll Tunes
</p>
    
 <div class="spotify-player">

<button onclick="prevSong()">⏮</button>

<button onclick="togglePlay()" id="playBtn">
▶
</button>

<button onclick="nextSong()">⏭</button>

<div class="track-info">

<img id="miniCover" src="cover1.JPG">

<div>
<h4 id="miniTitle">Song Name</h4>
<p>Troll Tunes</p>
</div>

</div>

<button>🔊</button>

</div>

<div class="progress-container">
<input type="range" id="progress" value="0">
</div>

<a id="downloadBtn" class="download-btn" download>
 DOWNLOAD
</a>


    <audio id="audio"></audio>

</div>


<script>

const songs = [

{
title:"Song 1",
artist:"Troll Tunes",
file:"song1.mp3",
cover:"cover1.JPG"
},

{
title:"Song 2",
artist:"Troll Tunes",
file:"song2.mp3",
cover:"cover2.JPG"
},

{
title:"Song 3",
artist:"Troll Tunes",
file:"song3.mp3",
cover:"cover3.JPG"
}

];

let currentSong =
parseInt(localStorage.getItem("currentSong")) || 0;

const audio=document.getElementById("audio");
const title=document.getElementById("title");
const artist=document.getElementById("artist");
const cover=document.getElementById("cover");
const progress=document.getElementById("progress");
const downloadBtn=document.getElementById("downloadBtn");
const gradients=[
"radial-gradient(circle at top, #4f8cff 0%, #1b3f7a 35%, #08152e 100%)",
"radial-gradient(circle at top, #ff5a5a 0%, #7a2323 35%, #2e0808 100%)",
"radial-gradient(circle at top, #3ddc84 0%, #1f6b47 35%, #071f15 100%)"
];
const glowColors=[
"#3b82f6",
"#ef4444",
"#10b981"
];
    
function loadSong(index){

title.textContent = songs[index].title;
artist.textContent = songs[index].artist;
cover.src = songs[index].cover;
document.getElementById("miniCover").src =
songs[index].cover;
document.getElementById("miniTitle").textContent =
songs[index].title;
audio.src = songs[index].file;
downloadBtn.href = songs[index].file;
document.body.style.background=gradients[index];
localStorage.setItem("currentSong", index);
album.style.boxShadow = `
0 0 18px ${glowColors[index]},
0 0 35px ${glowColors[index]},
0 0 60px ${glowColors[index]}
`;
 }


const album=document.querySelector(".album-cover");

function togglePlay(){

if(audio.paused){

audio.play();
album.classList.add("playing");
playBtn.innerHTML="❚❚";

}else{

audio.pause();
album.classList.remove("playing");
playBtn.innerHTML="►";

}

}

function nextSong(){

currentSong++;

if(currentSong>=songs.length){
currentSong=0;
}

loadSong(currentSong);

audio.play();

album.classList.add("playing");

document.getElementById("playBtn").innerHTML="❚❚";

}
    
function prevSong(){

currentSong--;

if(currentSong<0){
currentSong=songs.length-1;
}

loadSong(currentSong);

audio.play();

album.classList.add("playing");

document.getElementById("playBtn").innerHTML="❚❚";

}

audio.addEventListener("timeupdate",()=>{

progress.value=(audio.currentTime/audio.duration)*100||0;

});

progress.addEventListener("input",()=>{

audio.currentTime=
(progress.value/100)*audio.duration;

});
    audio.addEventListener("play",()=>{
document.getElementById("playBtn").innerHTML="❚❚";
album.classList.add("playing");
});

audio.addEventListener("pause",()=>{
document.getElementById("playBtn").innerHTML="►";
album.classList.remove("playing");
});

loadSong(currentSong);

</script>

</body>
</html>
