<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Tunes Music Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,
#5b1a5b 0%,
#220022 45%,
#000000 100%);
color:white;
}

.player-wrapper{
width:100%;
max-width:900px;
padding:20px;
text-align:center;
}

.spotify-logo{
font-size:28px;
font-weight:bold;
margin-bottom:40px;
opacity:.8;
}

.album-container{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:40px;
perspective:1000px;
}

.album-cover{
width:320px;
height:320px;
border-radius:30px;
overflow:hidden;
box-shadow:
0 20px 60px rgba(0,0,0,.6),
0 0 30px rgba(255,255,255,.08);
}

.album-cover img{
width:100%;
height:100%;
object-fit:cover;
}

.song-title{
font-size:32px;
font-weight:700;
margin-top:25px;
}

.artist{
color:#cfcfcf;
margin-top:8px;
font-size:18px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
margin-top:30px;
}

.controls button{
width:70px;
height:70px;
border:none;
border-radius:50%;
cursor:pointer;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);

color:white;
font-size:24px;

box-shadow:
0 8px 30px rgba(0,0,0,.4),
inset 0 1px 1px rgba(255,255,255,.15);

transition:all .3s ease;
}

.controls button:hover{
transform:translateY(-4px) scale(1.05);
background:rgba(255,255,255,.15);
}

.play-btn{
width:90px !important;
height:90px !important;

background:linear-gradient(
135deg,
#ffffff,
#d9d9d9
) !important;

color:#111 !important;

font-size:32px;

box-shadow:
0 10px 40px rgba(255,255,255,.25),
0 0 30px rgba(255,255,255,.15);
}

.progress-container{
width:100%;
margin-top:35px;
}

#progress{
width:100%;
cursor:pointer;
}

.download-btn{
display:inline-block;
margin-top:30px;
padding:14px 30px;
border-radius:40px;
background:white;
color:black;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.download-btn:hover{
transform:scale(1.05);
}

.player-bar{
margin-top:40px;
padding:20px;
border-radius:40px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
display:flex;
align-items:center;
justify-content:center;
gap:20px;
}

.player-bar img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.player-info{
text-align:left;
}

.player-info h4{
font-size:16px;
}

.player-info p{
font-size:13px;
color:#ccc;
}

audio{
display:none;
}

footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
color:#aaa;
font-size:14px;
}

@media(max-width:768px){

.album-cover{
width:250px;
height:250px;
}

.song-title{
font-size:24px;
}

.player-bar{
flex-direction:column;
}

}

</style>
</head>
<body>

<div class="player-wrapper">

<div class="spotify-logo">
TROLL TUNES
</div>

<div class="album-container">
<div class="album-cover">
<img id="cover" src="cover1.jpg">
</div>
</div>

<h1 id="title" class="song-title">
Song Name
</h1>

<p id="artist" class="artist">
Troll Tunes
</p>

<div class="controls">
<button onclick="prevSong()">⏮</button>

<button class="play-btn" onclick="togglePlay()" id="playBtn">
▶
</button>

<button onclick="nextSong()">⏭</button>
</div>

<div class="progress-container">
<input type="range" id="progress" value="0">
</div>

<a id="downloadBtn"
class="download-btn"
download>
⬇ Download MP3
</a>

<div class="player-bar">

<img id="cover" src="cover1.jpg">

<img id="smallCover" src="cover1.jpg">

<div class="player-info">
<h4 id="barTitle">Song Name</h4>
<p>Troll Tunes</p>
</div>

</div>

<audio id="audio"></audio>

</div>


<script>

const songs = [

{
title:"Song 1",
artist:"Troll Tunes",
file:"song1.mp3",
cover:"cover1.JPG"
},

{
title:"Song 2",
artist:"Troll Tunes",
file:"song2.mp3",
cover:"cover2.JPG"
},

{
title:"Song 3",
artist:"Troll Tunes",
file:"song3.mp3",
cover:"cover3.JPG"
}

];

let currentSong=0;

const audio=document.getElementById("audio");
const title=document.getElementById("title");
const artist=document.getElementById("artist");
const cover=document.getElementById("cover");
const smallCover=document.getElementById("smallCover");
const barTitle=document.getElementById("barTitle");
const progress=document.getElementById("progress");
const downloadBtn=document.getElementById("downloadBtn");

function loadSong(index){

title.textContent=songs[index].title;
artist.textContent=songs[index].artist;

cover.src=songs[index].cover;
smallCover.src=songs[index].cover;

barTitle.textContent=songs[index].title;

audio.src=songs[index].file;

downloadBtn.href=songs[index].file;

}

function togglePlay(){

if(audio.paused){

audio.play();

}else{

audio.pause();

}

}

function nextSong(){

currentSong++;

if(currentSong>=songs.length){

currentSong=0;

}

loadSong(currentSong);
audio.play();

}

function prevSong(){

currentSong--;

if(currentSong<0){

currentSong=songs.length-1;

}

loadSong(currentSong);
audio.play();

}

audio.addEventListener("timeupdate",()=>{

progress.value=(audio.currentTime/audio.duration)*100||0;

});

progress.addEventListener("input",()=>{

audio.currentTime=
(progress.value/100)*audio.duration;

});

loadSong(currentSong);

</script>

</body>
</html>
