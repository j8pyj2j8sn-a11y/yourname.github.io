<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Tunes Music Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,
#5b1a5b 0%,
#220022 45%,
#000000 100%);
color:white;
}

.player-wrapper{
width:100%;
max-width:420px;
margin:auto;

padding:20px 15px 80px;

display:flex;
flex-direction:column;
align-items:center;

box-sizing:border-box;
}

.spotify-logo{
font-size:28px;
font-weight:bold;
margin-bottom:40px;
opacity:.8;
}

.album-container{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
perspective:1000px;
}

.album-cover{
width:320px;
height:320px;
border-radius:50%;
overflow:hidden;

box-shadow:
0 0 25px rgba(0,255,255,.6),
0 0 50px rgba(0,255,255,.4),
0 0 80px rgba(0,255,255,.25);

transition:all .5s ease;
}

#cover{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
display:block;
}
.player{
width:95%;
max-width:430px;
margin:15px auto;
padding:20px;
box-sizing:border-box;
}

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 20px 50px rgba(0,0,0,.45),
    inset 0 1px 1px rgba(255,255,255,.25);

    box-sizing:border-box;
    overflow:hidden;
}
  @media (max-width:768px){

.player{
width:94vw;
padding:20px;
}

.album-cover img,
#cover{
width:100%;
max-width:280px;
aspect-ratio:1/1;
height:auto;
display:block;
margin:auto;
border-radius:25px;
object-fit:cover;
}

.song-title{
font-size:32px;
font-weight:700;
margin-top:25px;
margin-bottom:35px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:-15px;
}

.controls button{
width:60px;
height:60px;
font-size:22px;
}

.play-btn{
width:78px !important;
height:78px !important;
font-size:30px !important;
}

}

.song-title{
font-size:32px;
font-weight:700;
margin-top:25px;
margin-bottom:25px !important;
}

.artist{
display:none;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.controls button{
width:72px;
height:72px;
border:none;
border-radius:22px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.18);
color:white;
font-size:28px;
cursor:pointer;
transition:.3s;
box-shadow:
0 8px 32px rgba(0,0,0,.35),
inset 0 1px 1px rgba(255,255,255,.25);
}

.controls button:hover{
transform:translateY(-4px);
background:rgba(255,255,255,.18);
}

#playBtn{
width:75px;
height:75px;
border-radius:24px;
font-size:36px;
background:rgba(255,255,255,.18);
box-shadow:
0 12px 40px rgba(0,0,0,.4),
inset 0 1px 1px rgba(255,255,255,.3);
}

.progress-container{
width:100%;
margin-top:10px;
}

#progress{
width:100%;
cursor:pointer;
}

.download-btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:10px;

margin-top:30px;
padding:16px 40px;

border:none;
border-radius:50px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

color:#ffffff;
font-size:18px;
font-weight:700;
text-decoration:none;
cursor:pointer;

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 0 10px rgba(0,255,255,0.4),
0 0 20px rgba(0,255,255,0.25),
inset 0 0 15px rgba(255,255,255,0.08);

transition:all .35s ease;
}

.download-btn:hover{
transform:translateY(-3px) scale(1.05);

box-shadow:
0 0 15px rgba(0,255,255,0.7),
0 0 35px rgba(0,255,255,0.5),
0 0 60px rgba(0,255,255,0.3);

background:rgba(255,255,255,0.12);
}

.download-btn:active{
transform:scale(.96);
}

.player-bar{
margin-top:40px;
padding:20px;
border-radius:40px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
display:flex;
align-items:center;
justify-content:center;
gap:20px;
}

.player-bar img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.player-info{
text-align:left;
}

.player-info h4{
font-size:16px;
}

.player-info p{
font-size:13px;
color:#ccc;
}

audio{
display:none;
}

footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
color:#aaa;
font-size:14px;
}

@media(max-width:768px){

.album-cover{
width:250px;
height:250px;
border-radius:50%;
}

.player-bar{
flex-direction:column;
}
}
    @media (max-width:768px){

    .player{
        width:96vw;
        padding:15px;
    }

    #cover{
        max-width:220px;
    }

    .song-title{
        font-size:32px;
    }

    .controls{
        gap:12px;
    }

    .controls button{
        width:58px;
        height:58px;
    }

    .play-btn{
        width:78px !important;
        height:78px !important;
    }
}
    @media (max-width:768px){

.player{
width:95%;
max-width:380px;
padding:18px;
}

.song-title{
font-size:42px;
}

.artist{
font-size:16px;
}

.controls{
gap:12px;
}

.controls button{
width:60px;
height:60px;
font-size:22px;
}

.play-btn{
width:75px !important;
height:75px !important;
}
.album-cover.playing{
animation:spin 15s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
#progress{
-webkit-appearance:none;
appearance:none;
height:8px;
border-radius:20px;
background:rgba(255,255,255,.15);
}

#progress::-webkit-slider-thumb{
-webkit-appearance:none;
width:18px;
height:18px;
border-radius:50%;
background:#00ffff;
box-shadow:
0 0 10px #00ffff,
0 0 25px #00ffff;
cursor:pointer;
}

}

</style>
</head>
<body>

<div class="player-wrapper player">

<div class="spotify-logo">
TROLL TUNES
</div>

<div class="album-container">
<div class="album-cover">
<img id="cover" src="cover1.JPG">
</div>
</div>

<h1 id="title" class="song-title">
Song Name
</h1>

<p id="artist" class="artist">
Troll Tunes
</p>

<div class="controls">
<button onclick="prevSong()">❮</button>

<button class="play-btn" onclick="togglePlay()" id="playBtn">
►
</button>

<button onclick="nextSong()">❯</button>
</div>

<div class="progress-container">
<input type="range" id="progress" value="0">
</div>

<a id="downloadBtn" class="download-btn" download>
 DOWNLOAD
</a>


    <audio id="audio"></audio>

</div>


<script>

const songs = [

{
title:"Song 1",
artist:"Troll Tunes",
file:"song1.mp3",
cover:"cover1.JPG"
},

{
title:"Song 2",
artist:"Troll Tunes",
file:"song2.mp3",
cover:"cover2.JPG"
},

{
title:"Song 3",
artist:"Troll Tunes",
file:"song3.mp3",
cover:"cover3.JPG"
}

];

let currentSong=0;

const audio=document.getElementById("audio");
const title=document.getElementById("title");
const artist=document.getElementById("artist");
const cover=document.getElementById("cover");
const progress=document.getElementById("progress");
const downloadBtn=document.getElementById("downloadBtn");
const gradients=[
"radial-gradient(circle at top,#3b82f6,#000)",
"radial-gradient(circle at top,#ef4444,#000)",
"radial-gradient(circle at top,#10b981,#000)"
];

const glowColors=[
"#3b82f6",
"#ef4444",
"#10b981"
];
    
function loadSong(index){

title.textContent = songs[index].title;
artist.textContent = songs[index].artist;
cover.src = songs[index].cover;

audio.src = songs[index].file;

downloadBtn.href = songs[index].file;
document.body.style.background=gradients[index];

    album.style.boxShadow = `
0 0 30px ${glowColors[index]},
0 0 60px ${glowColors[index]},
0 0 100px ${glowColors[index]}
`;
}

const album=document.querySelector(".album-cover");

function togglePlay(){

if(audio.paused){

audio.play();
album.classList.add("playing");
playBtn.innerHTML="❚❚";

}else{

audio.pause();
album.classList.remove("playing");
playBtn.innerHTML="►";

}

}

function nextSong(){

currentSong++;

if(currentSong>=songs.length){

currentSong=0;

}

loadSong(currentSong);
audio.play();

}

function prevSong(){

currentSong--;

if(currentSong<0){

currentSong=songs.length-1;

}

loadSong(currentSong);
audio.play();

}

audio.addEventListener("timeupdate",()=>{

progress.value=(audio.currentTime/audio.duration)*100||0;

});

progress.addEventListener("input",()=>{

audio.currentTime=
(progress.value/100)*audio.duration;

});

loadSong(currentSong);

</script>

</body>
</html>
