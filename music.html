<!DOCTYPE html>
<html>
<head>
<title>Troll Tunes Music</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

.music-container{
    max-width:500px;
    margin:auto;
    padding:30px;
}

#albumCover{
    width:300px;
    border-radius:15px;
    margin-bottom:20px;
}

audio{
    width:100%;
    margin:20px 0;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.download-btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:#00cc66;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

</style>

</head>

<body>

<div class="music-container">

<img id="albumCover" src="cover1.JPG">

<h2 id="songTitle">Song 1</h2>

<p>Troll Tunes</p>

<audio id="player" controls></audio>

<br>

<button onclick="previousSong()">⏮ Previous</button>

<button onclick="nextSong()">Next ⏭</button>

<br>

<a id="downloadBtn" class="download-btn" download>
Download Song
</a>

</div>

<script>

const songs = [

{
title:"Song 1",
audio:"song1.mp3",
cover:"cover1.JPG"
},

{
title:"Song 2",
audio:"song2.mp3",
cover:"cover2.JPG"
}

];

let currentSong = 0;

const player =
document.getElementById("player");

const cover =
document.getElementById("albumCover");

const title =
document.getElementById("songTitle");

function loadSong(index){

title.innerText =
songs[index].title;

cover.src =
songs[index].cover;

player.src =
songs[index].audio;

document.getElementById(
"downloadBtn"
).href =
songs[index].audio;

}

function nextSong(){

currentSong++;

if(currentSong >= songs.length){

currentSong = 0;

}

loadSong(currentSong);

}

function previousSong(){

currentSong--;

if(currentSong < 0){

currentSong =
songs.length - 1;

}

loadSong(currentSong);

}

loadSong(0);

</script>

</body>
</html>
