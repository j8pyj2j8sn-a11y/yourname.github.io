<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Troll Tunes</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top,
#5b1a5b 0%,
#220022 45%,
#000000 100%);

color:white;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;

background:
radial-gradient(
circle,
transparent 30%,
rgba(0,0,0,.25) 55%,
rgba(0,0,0,.65) 80%,
rgba(0,0,0,.9) 100%
);
}

.wrapper{
width:100%;
max-width:1100px;
padding:20px;
text-align:center;
}

.logo{
font-size:36px;
font-weight:700;
letter-spacing:3px;
margin-bottom:30px;
}

.carousel{
position:relative;
height:340px;

display:flex;
justify-content:center;
align-items:center;

perspective:1200px;
}

.album-card{

position:absolute;

width:220px;
height:280px;

border-radius:24px;
overflow:hidden;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 15px 40px rgba(0,0,0,.4);

transition:
transform .6s ease,
opacity .6s ease;
}

.album-card img{
width:100%;
height:100%;
object-fit:cover;
}

.player-bar{
margin-top:35px;
padding:18px 25px;

border-radius:40px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
gap:20px;
}
  .track-info{
display:flex;
align-items:center;
gap:12px;
justify-self:start;
}

.controls{
display:flex;
align-items:center;
gap:20px;
justify-self:center;
}

.progress-wrap{
display:flex;
align-items:center;
width:100%;
justify-self:end;
}

#progress{
width:100%;
}

.control-btn{

background:none;
border:none;

color:white;

font-size:32px;

cursor:pointer;

transition:.3s;
}

.control-btn:hover{
transform:scale(1.1);
}

.play-btn{
font-size:40px;
}

.track-info{

display:flex;
align-items:center;

gap:12px;

flex:1;
text-align:left;
}

.track-info img{

width:55px;
height:55px;

border-radius:12px;

object-fit:cover;
}

.track-info h4{
font-size:16px;
margin-bottom:4px;
}

.track-info p{
font-size:12px;
color:#ccc;
}
.progress-wrap{
flex:1;
display:flex;
align-items:center;
gap:10px;
}

#progress{

width:100%;

-webkit-appearance:none;
appearance:none;

height:6px;

border-radius:20px;

background:rgba(255,255,255,.15);

cursor:pointer;
}

#progress::-webkit-slider-thumb{

-webkit-appearance:none;

width:18px;
height:18px;

border-radius:50%;

background:#00ffff;

box-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff;
}

.download-btn{
padding:8px 14px;
font-size:14px;
border-radius:20px;
}

text-decoration:none;
color:white;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.15);

transition:.3s;
}

.download-btn:hover{
transform:scale(1.05);
}

audio{
display:none;
}

@media(max-width:768px){

.carousel{
height:280px;
}

.album-card{
width:170px;
height:220px;
}

.player-bar{
flex-wrap:nowrap;
justify-content:space-between;
}

.track-info{
width:auto;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="logo">
TROLL TUNES
</div>

<div class="carousel" id="carousel"></div>

<div class="player-bar">

<button class="control-btn"
onclick="prevSong()">
❮
</button>

<button
id="playBtn"
class="control-btn play-btn"
onclick="togglePlay()">
▶
</button>

<button class="control-btn"
onclick="nextSong()">
❯
</button>

<div class="track-info">

<img
id="miniCover"
src="lunar.JPG">

<div>

<h4 id="songTitle">
Lunar
</h4>

<p>
Troll Tunes
</p>

</div>

</div>

<div class="progress-wrap">

<input
type="range"
id="progress"
value="0">

</div>

<a
id="downloadBtn"
class="download-btn"
download>

Download

</a>

</div>

<audio id="audio"></audio>

</div>

<script>

const songs=[

{
title:"Lunar",
file:"Lunar.mp3",
cover:"lunar.JPG"
},

{
title:"Say It",
file:"Say it.mp3",
cover:"sayit.JPG"
},

{
title:"Deep End",
file:"Deep end.mp3",
cover:"deepend.JPG"
},

{
title:"Wonder",
file:"Wonder.mp3",
cover:"wonder.JPG"
},

{
title:"Dream",
file:"Dream.mp3",
cover:"dream.JPG"
}

];
let currentSong = 0;

const audio = document.getElementById("audio");
const carousel = document.getElementById("carousel");
const songTitle = document.getElementById("songTitle");
const miniCover = document.getElementById("miniCover");
const progress = document.getElementById("progress");
const downloadBtn = document.getElementById("downloadBtn");
const playBtn = document.getElementById("playBtn");

const gradients = [

"radial-gradient(circle at top,#5b1a5b 0%,#220022 45%,#000 100%)",

"radial-gradient(circle at top,#4f46e5 0%,#1e1b4b 45%,#000 100%)",

"radial-gradient(circle at top,#059669 0%,#064e3b 45%,#000 100%)",

"radial-gradient(circle at top,#dc2626 0%,#450a0a 45%,#000 100%)",

"radial-gradient(circle at top,#ca8a04 0%,#422006 45%,#000 100%)"

];

function renderCarousel(){

carousel.innerHTML="";

songs.forEach((song,index)=>{

const card=document.createElement("div");
card.className="album-card";

let offset=index-currentSong;

if(offset>2) offset-=songs.length;
if(offset<-2) offset+=songs.length;

if(offset===0){

card.style.transform=
"translateX(0px) scale(1)";
card.style.zIndex="5";
card.style.opacity="1";

}

else if(offset===-1){

card.style.transform=
"translateX(-180px) rotateY(40deg) scale(.85)";
card.style.opacity=".7";

}

else if(offset===1){

card.style.transform=
"translateX(180px) rotateY(-40deg) scale(.85)";
card.style.opacity=".7";

}

else if(offset===-2){

card.style.transform=
"translateX(-320px) rotateY(55deg) scale(.7)";
card.style.opacity=".35";

}

else if(offset===2){

card.style.transform=
"translateX(320px) rotateY(-55deg) scale(.7)";
card.style.opacity=".35";

}

card.innerHTML=
`<img src="${song.cover}" alt="">`;

carousel.appendChild(card);

});

}

function loadSong(index){

audio.src=songs[index].file;

songTitle.textContent=
songs[index].title;

miniCover.src=
songs[index].cover;

downloadBtn.href=
songs[index].file;

document.body.style.background=
gradients[index];

renderCarousel();

}

function togglePlay(){

if(audio.paused){

audio.play();
playBtn.innerHTML="❚❚";

}else{

audio.pause();
playBtn.innerHTML="▶";

}

}

function nextSong(){

currentSong++;

if(currentSong>=songs.length){
currentSong=0;
}

loadSong(currentSong);

audio.play();

playBtn.innerHTML="❚❚";

}

function prevSong(){

currentSong--;

if(currentSong<0){
currentSong=songs.length-1;
}

loadSong(currentSong);

audio.play();

playBtn.innerHTML="❚❚";

}

audio.addEventListener("timeupdate",()=>{

progress.value=
(audio.currentTime/audio.duration)*100||0;

});

progress.addEventListener("input",()=>{

audio.currentTime=
(progress.value/100)*audio.duration;

});

audio.addEventListener("ended",()=>{

nextSong();

});

audio.addEventListener("pause",()=>{

playBtn.innerHTML="▶";

});

audio.addEventListener("play",()=>{

playBtn.innerHTML="❚❚";

});

loadSong(currentSong);

</script>

</body>
</html>
