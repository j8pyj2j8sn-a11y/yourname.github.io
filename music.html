<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Troll Tunes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* PASTE PART 2 CSS HERE */

</style>

</head>

<body>

<div class="bg-glow"></div>

<div class="wrapper">

<!-- LOGO -->

<h1 class="logo">
TROLL TUNES
</h1>

<!-- FAN CAROUSEL -->

<div class="carousel">

<div id="coverTrack" class="cover-track">

<!-- Covers generated by JS -->

</div>

</div>

<!-- PLAYER -->

<div class="player">

<div class="player-rgb"></div>

<div class="player-inner">

<!-- SONG INFO -->

<div class="song-info">

<img
id="miniCover"
class="mini-cover"
src="lunar.JPG"
alt="Album Cover">

<div class="song-text">

<h3 id="songTitle">
Lunar
</h3>

<p>
Troll Tunes
</p>

</div>

</div>

<!-- PROGRESS -->

<div class="progress-section">

<div class="time-row">

<span id="currentTime">
0:00
</span>

<span id="duration">
0:00
</span>

</div>

<input
type="range"
id="progress"
value="0"
min="0"
max="100">

</div>

<!-- CONTROLS -->

<div class="controls">

<button
class="icon-btn"
onclick="prevSong()">

⏮

</button>

<button
id="playBtn"
class="play-btn"
onclick="togglePlay()">

▶

</button>

<button
class="icon-btn"
onclick="nextSong()">

⏭

</button>

</div>

<!-- DOWNLOAD -->

<a
id="downloadBtn"
class="download-btn"
download>

DOWNLOAD

</a>

</div>

</div>

</div>

<audio id="audio"></audio>

<script>

/* PASTE PART 3 JAVASCRIPT HERE */

</script>

</body>
</html>
