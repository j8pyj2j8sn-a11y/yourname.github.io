<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TROLL TUNES</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:white;
    padding:20px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

header h1{
    margin:0;
    color:#6c3cff;
}

.hero{
    background:#f0eaff;
    text-align:center;
    padding:80px 20px;
}

.hero h2{
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    color:#555;
    margin-bottom:25px;
}

.button{
    background:#6c3cff;
    color:white;
    padding:15px 30px;
    text-decoration:none;
    border-radius:10px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.song{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.song h3{
    margin-top:0;
}

.download{
    display:inline-block;
    background:#6c3cff;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
    margin-bottom:15px;
}

audio{
    width:100%;
}

footer{
    text-align:center;
    padding:30px;
    color:#666;
}

</style>
</head>

<body>

<header>
    <h1>🎵 TROLL TUNES</h1>
</header>

<section class="hero">
    <h2>Download Your Favorite Audio</h2>
    <p>High quality M4A audio files</p>

    <a class="button" href="#songs">
        Browse Songs
    </a>
</section>

<div class="container" id="songs">

    <div class="song">
        <h3>സോറി ആളുമാറിപ്പോയി</h3>

        <a class="download" href="song1.m4a" download>
            Download
        </a>

        <audio controls>
            <source src="song1.m4a" type="audio/mp4">
        </audio>
    </div>

    <div class="song">
        <h3>മിണ്ടാതിരിയേടാ പട്ടി</h3>

        <a class="download" href="song2.m4a" download>
            Download
        </a>

        <audio controls>
            <source src="song2.m4a" type="audio/mp4">
        </audio>
    </div>

    <div class="song">
        <h3>എടാ നാറി, നിനക്ക് നാണം ഉണ്ടോ?</h3>

        <a class="download" href="song3.m4a" download>
            Download
        </a>

        <audio controls>
            <source src="song3.m4a" type="audio/mp4">
        </audio>
    </div>

</div>

<footer>
    © 2026 Troll Tunes
</footer>

</body>
</html>
