<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
url("background.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.hero-box{

width:92%;
height:90vh;

border-radius:40px;

overflow:hidden;
position:relative;

border:1px solid rgba(255,255,255,.18);

backdrop-filter:blur(15px);

background:
linear-gradient(
to bottom,
rgba(0,0,0,.96) 0%,
rgba(0,0,0,.92) 20%,
rgba(0,0,0,.75) 45%,
rgba(0,0,0,.35) 70%,
rgba(0,0,0,0) 100%
);

}

nav{

display:flex;
justify-content:space-between;
align-items:center;

padding:40px 50px;
}

.logo{

display:flex;
align-items:center;
gap:15px;

color:white;
font-size:22px;
font-weight:700;
}

.logo-icon{

font-size:40px;
color:#00eaff;
}

.menu{

display:flex;
gap:60px;
}

.menu a{

text-decoration:none;
color:white;
font-size:18px;
font-weight:500;

position:relative;
}

.menu a.active::after{

content:'';

position:absolute;

bottom:-12px;
left:0;

width:100%;
height:3px;

background:#00eaff;
}

.right{

display:flex;
align-items:center;
gap:20px;
}

.vibe{

padding:15px 25px;

border-radius:50px;

border:1px solid rgba(0,234,255,.5);

color:white;
}

.menu-btn{

width:55px;
height:55px;

border-radius:50%;

border:1px solid rgba(255,255,255,.2);

display:flex;
justify-content:center;
align-items:center;

color:white;
font-size:24px;
}

.hero{

position:absolute;

left:70px;
top:210px;
}

.small{

color:#00eaff;

font-size:20px;

letter-spacing:1px;

margin-bottom:25px;
}

.hero h1{

font-size:110px;

font-weight:900;

line-height:.9;

color:white;
}

.hero h1 span{

display:block;

background:linear-gradient(
90deg,
#00ffff,
#39bfff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.quote{

margin-top:35px;

font-size:20px;

color:#d8d8d8;

line-height:1.8;
}

.cta{

margin-top:40px;

display:inline-block;

padding:18px 35px;

border-radius:50px;

border:1px solid #00eaff;

text-decoration:none;

color:#00eaff;
}

.scroll{

position:absolute;

bottom:40px;

left:50%;

transform:translateX(-50%);

color:white;

letter-spacing:4px;

font-size:13px;
}

</style>
</head>
<body>

<div class="hero-box">

<nav>

<div class="logo">
<div class="logo-icon">△</div>
WE CREATE
</div>

<div class="menu">
<a href="#" class="active">Troll Vault</a>
<a href="#">NCS</a>
<a href="#">EchoScapes</a>
<a href="#">CineTone</a>
</div>

<div class="right">

<div class="vibe">
Vibe4Kick ▼
</div>

<div class="menu-btn">
☰
</div>

</div>

</nav>

<div class="hero">

<div class="small">
PREMIUM AUDIO. LIMITLESS CREATIVITY.
</div>

<h1>
WE CREATE
<span>FOR YOU</span>
</h1>

<div class="quote">
"Your vision. Our creativity.<br>
Extraordinary stories brought to life."
</div>

<a href="#" class="cta">
EXPLORE COLLECTION →
</a>

</div>

<div class="scroll">
SCROLL DOWN
</div>

</div>

</body>
</html>
